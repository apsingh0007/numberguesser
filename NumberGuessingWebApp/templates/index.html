<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container glass-panel">
        <div class="header">
            <h1>🎯 Number Guesser</h1>
            <p>I'm thinking of a number between <span class="highlight">1</span> and <span class="highlight">100</span></p>
        </div>
        
        <div class="game-area">
            <input type="number" id="guess-input" placeholder="Enter your guess..." min="1" max="100" autocomplete="off">
            <button id="guess-btn" class="btn primary-btn">Guess!</button>
        </div>
        
        <div id="feedback-container" class="feedback hidden">
            <p id="feedback-text"></p>
        </div>
        
        <div class="stats">
            <p>Attempts: <span id="attempts-count">0</span></p>
        </div>
        
        <button id="reset-btn" class="btn secondary-btn hidden">Play Again</button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
